<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#f8f1e5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#14110f" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="FoodMatch is a Valencia-first restaurant discovery pilot. Tell us your craving, budget, area, and vibe — we find the table that fits." />

    <title>FoodMatch · Valencia restaurant discovery pilot</title>

    <!-- Web App Manifest (Android/Chrome/Edge) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FoodMatch" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="/icons/icon-256.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />

    <!-- Pre-paint theme bootstrap. Runs synchronously before React mounts
         so the page never flashes the wrong theme. Reads user's stored
         preference, falls back to OS preference. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('fm.theme');
          var mode = stored === 'light' || stored === 'dark' || stored === 'system'
            ? stored
            : 'system';
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = mode === 'system' ? (prefersDark ? 'dark' : 'light') : mode;
          if (theme === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.setAttribute('data-mode', mode);
        } catch (e) { /* localStorage may be blocked */ }
      })();
    </script>

    <!-- Splash background while loading on iOS standalone -->
    <style>
      html, body { background: #f8f1e5; }
      html.dark, html.dark body { background: #14110f; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
